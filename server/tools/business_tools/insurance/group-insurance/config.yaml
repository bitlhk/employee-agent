# Smart Insurance Skill 0611 配置文件
# 基于MCP架构，通过openclaw服务器间接访问外部网络

# MCP服务器配置（部署在openclaw服务器上）
mcp:
  server_url: "http://openclaw-server:6080"  # MCP服务器地址
  timeout: 300                                # 请求超时时间（秒）
  retry_times: 3                             # 重试次数
  retry_delay: 1                             # 重试延迟（秒）

# 多模态识别配置（通过MCP调用）
# 注意：API URL和密钥应在MCP Server端通过环境变量配置，不要在此处配置
vision:
  provider: "huawei"                         # 服务商（huawei/aliyun/openai）
  max_concurrency: 5                         # 最大并发数

# LLM配置（通过MCP调用）
# 注意：API URL和密钥应在MCP Server端通过环境变量配置，不要在此处配置
llm:
  default_provider: "huawei"                 # 默认服务商（huawei/aliyun/openai）


# Pipeline配置
pipeline:
  output:
    base_dir: "./outputs"                    # 输出基础目录
  pdf:
    dpi: 200                                 # PDF转图片DPI
  text:
    enable_page_tag: true                    # 是否启用<page>标签
  extraction:
    liability_rounds: 5                      # 保险责任推理轮次

# 模板配置
templates:
  base_dir: "./templates/insurance"          # Prompt模板目录

# 存储配置
storage:
  cache_dir: "./cache"                       # 缓存目录
  log_dir: "./logs"                          # 日志目录

# 日志配置
logging:
  level: "INFO"                              # 日志级别
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"