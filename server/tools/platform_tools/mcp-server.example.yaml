name: platform_tools
enabled: true
transport: stdio
command: /path/to/employee-agent/node_modules/.bin/tsx
args:
  - /path/to/employee-agent/server/tools/platform_tools/platform-tools-mcp.ts
cwd: /path/to/employee-agent
user_context: true
env:
  INTERNAL_API_KEY: ${INTERNAL_API_KEY}
  INTERNAL_BASE_URL: http://127.0.0.1:5180
timeout_s: 30
